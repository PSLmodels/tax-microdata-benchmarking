[pytest]
testpaths =
    tmd
# Surface warnings in pytest's end-of-run summary.  Pipeline-run
# warnings (those emitted during `make data`) are captured separately
# to tmd/storage/output/make_data.log; see `make warnings`.
filterwarnings =
    default
markers =
    pop
    taxexp
    itax
    weight_distribution
    imputed_distribution
    obbba_deduction
